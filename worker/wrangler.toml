name = "tbb-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Worker runs first for every request; non-/api/* paths fall through to static assets.
[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "tbb-db"
database_id = "e9da475c-f130-4880-95be-ca2a5ba75693"
migrations_dir = "migrations"

[vars]
ADMIN_EMAIL = "barbell@ballerina.com"
KLAVIYO_API_REVISION = "2025-04-15"
# true on HTTPS production; false only for local http dev.
SESSION_COOKIE_SECURE = "true"
SESSION_SAME_SITE = "Lax"
CORS_ALLOWED_ORIGINS = "http://localhost:8080"

# Secrets via worker/.dev.vars (local) or `wrangler secret put` (production):
# SESSION_SECRET, ADMIN_PASSWORD, KLAVIYO_PRIVATE_API_KEY, KLAVIYO_EARLY_ACCESS_LIST_ID
