name = "tbb-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Create with: npx wrangler d1 create tbb-website
# Then replace database_id below with the ID from that command.
[[d1_databases]]
binding = "DB"
database_name = "tbb-website"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[vars]
ADMIN_EMAIL = "barbell@ballerina.com"
KLAVIYO_API_REVISION = "2025-04-15"
SESSION_COOKIE_SECURE = "false"

# Set secrets for production (wrangler secret put …) or copy .dev.vars.example → .dev.vars locally:
# SESSION_SECRET, ADMIN_PASSWORD, KLAVIYO_PRIVATE_API_KEY, KLAVIYO_EARLY_ACCESS_LIST_ID
