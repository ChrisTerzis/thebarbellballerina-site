# API-only Worker — use when the static site is hosted elsewhere (e.g. Hostinger).
# Deploy: npm run worker:deploy:api
# Point the frontend build at this URL via VITE_API_BASE_URL in .env.production

name = "tbb-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "tbb-db"
database_id = "e9da475c-f130-4880-95be-ca2a5ba75693"
migrations_dir = "migrations"

[vars]
ADMIN_EMAIL = "barbell@ballerina.com"
KLAVIYO_API_REVISION = "2025-04-15"
SESSION_COOKIE_SECURE = "true"
SESSION_SAME_SITE = "None"
CORS_ALLOWED_ORIGINS = "https://thebarbellballerina.com,https://www.thebarbellballerina.com,http://localhost:8080"

# Secrets: wrangler secret put SESSION_SECRET (etc.) — use -c wrangler.api.toml
